<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyWithUs — Dashboard</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body class="bg-gradient">
  <div class="deco-hearts"></div>
  <div id="toast-container" class="toast-container"></div>

  <nav class="nav">
    <a href="dashboard.html" class="nav-brand"><span>🎀</span> StudyWithUs</a>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link active">🏠 Home</a>
      <a href="stats.html" class="nav-link">📊 Stats</a>
      <a href="settings.html" class="nav-link">⚙️ Settings</a>
      <button class="btn btn-ghost btn-sm" onclick="doSignOut()">Sign out</button>
    </div>
  </nav>

  <main class="dashboard-page">
    <div class="greeting animate-in">
      <h2 id="greeting-text">Hello 💖</h2>
      <p id="greeting-date"></p>
    </div>

    <div class="card timer-card animate-in delay-1">
      <div class="timer-display" id="timer-display">00:00:00</div>
      <div class="timer-status" id="timer-status">Ready to study? Let's go! 🌸</div>
      <div class="timer-controls">
        <button id="btn-start" disabled class="btn btn-primary btn-lg" onclick="startStudy()">▶ Start Study</button>
        <button id="btn-stop" class="btn btn-danger btn-lg hidden" onclick="stopStudy()">⏹ Stop Study</button>
      </div>
      <p class="motivational" id="motivational-quote"></p>
    </div>

    <div class="quick-stats">
      <div class="card stat-mini animate-in delay-1">
        <span class="stat-icon">📅</span>
        <div class="stat-value" id="stat-today">0m</div>
        <div class="stat-label">Today</div>
      </div>
      <div class="card stat-mini animate-in delay-2">
        <span class="stat-icon">📆</span>
        <div class="stat-value" id="stat-week">0m</div>
        <div class="stat-label">This Week</div>
      </div>
      <div class="card stat-mini animate-in delay-3">
        <span class="stat-icon">🏆</span>
        <div class="stat-value" id="stat-sessions">0</div>
        <div class="stat-label">Sessions</div>
      </div>
    </div>

    <div class="card animate-in delay-2">
      <div class="section-header">
        <span class="section-title">🌸 Recent Sessions</span>
        <a href="stats.html" class="btn btn-ghost btn-sm">View all →</a>
      </div>
      <div class="sessions-list" id="sessions-list">
        <div class="sessions-empty">Loading… ✨</div>
      </div>
    </div>

    <div class="card goals-card animate-in delay-3">
      <div class="section-header">
        <span class="section-title">🎀 Today's Goals</span>
        <span class="goals-summary-badge"><span id="goals-done">0</span>/<span id="goals-total">0</span> done</span>
      </div>
      <div class="goals-progress-track"><div class="goals-progress-bar" id="goals-progress-bar"></div></div>
      <div class="goals-progress-label"><span id="goals-pct">0%</span> complete ✨</div>
      <div class="goals-input-row">
        <input type="text" id="goal-input" class="goals-input"
          placeholder="Add a goal for today… 🌸" maxlength="120"
          onkeydown="if(event.key==='Enter')handleAddGoal()"/>
        <button class="btn btn-primary goals-add-btn" onclick="handleAddGoal()">+ Add</button>
      </div>
      <ul class="goals-list" id="goals-list"></ul>
    </div>
  </main>

  <script src="supabase.js"></script>
  <script src="app.js"></script>
  <script>
    let _user = null, _settings = {}, _sessions = [];

    requireAuth(async user => {
      _user = user;
      _settings = await getSettings(user.id);
      document.getElementById("btn-start").disabled = false;

      const h = new Date().getHours();
      const name = _settings.displayName || user.email.split("@")[0];
      document.getElementById("greeting-text").textContent =
        (h<12?"Good morning":h<17?"Good afternoon":"Good evening")+", "+name+"! 💖";
      document.getElementById("greeting-date").textContent =
        new Date().toLocaleDateString([],{weekday:"long",year:"numeric",month:"long",day:"numeric"});
      document.getElementById("motivational-quote").textContent = getMotivationalQuote();

      await Promise.all([loadSessions(), restoreSession(), loadGoals(user.id)]);
    });

    async function loadSessions() {
      try {
        _sessions = await getLatestSessions(_user.id, 10);
        renderSessions(); renderStats();
      } catch(e) {
        document.getElementById("sessions-list").innerHTML =
          `<div class="sessions-empty">Could not load sessions — refresh to try again 🌸</div>`;
      }
    }

    function renderSessions() {
      const el = document.getElementById("sessions-list");
      if (!_sessions.length) {
        el.innerHTML = `<div class="sessions-empty">No sessions yet — start studying! 🌷</div>`;
        return;
      }
      el.innerHTML = _sessions.map(s =>
        `<div class="session-item">
          <div>
            <div class="session-date">${s.date||"—"}</div>
            <div class="session-time">${s.startTimeLabel}${s.endTimeLabel?" → "+s.endTimeLabel:""}</div>
          </div>
          <div class="session-duration">${formatDuration(s.duration)}</div>
        </div>`).join("");
    }

    function renderStats() {
      const today = new Date().toISOString().split("T")[0];
      const todayMin = _sessions.filter(s=>s.date===today).reduce((a,s)=>a+s.duration,0);
      const weekMin  = _sessions.reduce((a,s)=>a+s.duration,0);
      document.getElementById("stat-today").textContent    = formatDuration(todayMin);
      document.getElementById("stat-week").textContent     = formatDuration(weekMin);
      document.getElementById("stat-sessions").textContent = _sessions.length;
    }

    async function restoreSession() {
      try {
        const a = await getActiveSession(_user.id);
        if (a?.startTime) {
          sessionStart = new Date(a.startTime);
          isStudying = true;
          setStudyUI(true);
          startTimerUI(sessionStart, document.getElementById("timer-display"));
          _toast("Restored your ongoing session 🌸", "info");
        }
      } catch(e) { console.warn("Restore session error:", e); }
    }

    function setStudyUI(on) {
      document.getElementById("btn-start").classList.toggle("hidden", on);
      document.getElementById("btn-stop").classList.toggle("hidden", !on);
      const st = document.getElementById("timer-status");
      if (on) {
        st.innerHTML = `<span class="timer-pulse"></span>Session in progress…`;
        st.classList.add("active");
      } else {
        st.textContent = "Ready to study? Let's go! 🌸";
        st.classList.remove("active");
      }
    }

    async function startStudy() {
      if (isStudying || !_user) return;
      const btn = document.getElementById("btn-start");
      btn.disabled = true;
      try {
        sessionStart = new Date();
        isStudying = true;
        await saveActiveSession(_user.id, sessionStart.toISOString());
        setStudyUI(true);
        startTimerUI(sessionStart, document.getElementById("timer-display"));
        document.getElementById("motivational-quote").textContent = getMotivationalQuote();
        _toast("Study session started! Stay focused 💖", "success");

        // Send email notification
        const name = _settings.displayName || _user.email.split("@")[0];
        const partner = _settings.partnerEmail || "";
        sendStudyEmail(
          name + " started studying 🌸",
          buildEmailHtml(name, "Study Session Started 🌸", [
            `<strong>${name}</strong> just started a study session! 📚`,
            `<div class="hl">🕐 Started at: <strong>${formatTime(sessionStart)}</strong><br/>📧 User: <strong>${_user.email}</strong></div>`,
            `Keep up the great work and stay accountable! 💪`
          ]),
          partner
        ).then(() => console.log("✅ Start email sent"))
         .catch(e => console.warn("Email failed:", e.message));

      } catch(e) {
        _toast("Could not start session: " + e.message, "error");
        isStudying = false; setStudyUI(false);
      } finally { btn.disabled = false; }
    }

    async function stopStudy() {
      if (!isStudying || !sessionStart) return;
      const btn = document.getElementById("btn-stop");
      btn.disabled = true;
      const end = new Date();
      const dur = Math.max(1, Math.round((end - sessionStart) / 60000));
      isStudying = false;
      stopTimerUI();
      setStudyUI(false);
      document.getElementById("timer-display").textContent = "00:00:00";

      try {
        await saveSession(_user.id, {
          startTime: sessionStart.toISOString(), endTime: end.toISOString(),
          date: sessionStart.toISOString().split("T")[0], duration: dur
        });
        await clearActiveSession(_user.id);
        await loadSessions();
        _toast("Great session! " + formatDuration(dur) + " studied 🎉", "success");

        // Send email notification
        const name = _settings.displayName || _user.email.split("@")[0];
        const partner = _settings.partnerEmail || "";
        sendStudyEmail(
          name + " finished studying 🎉",
          buildEmailHtml(name, "Study Session Complete 🎉", [
            `<strong>${name}</strong> just finished a study session! 🎉`,
            `<div class="hl">
              📅 Date: <strong>${sessionStart.toISOString().split("T")[0]}</strong><br/>
              🕐 From: <strong>${formatTime(sessionStart)}</strong> → <strong>${formatTime(end)}</strong><br/>
              ⏱️ Duration: <strong>${formatDuration(dur)}</strong><br/>
              📧 User: <strong>${_user.email}</strong>
            </div>`,
            `Amazing work! Keep pushing forward 💪✨`
          ]),
          partner
        ).then(() => console.log("✅ Stop email sent"))
         .catch(e => console.warn("Email failed:", e.message));

      } catch(e) {
        _toast("Save failed — check your connection", "error");
      } finally { btn.disabled = false; sessionStart = null; }
    }

    async function doSignOut() { await signOut(); window.location.href = "index.html"; }

    async function handleAddGoal() {
      const inp = document.getElementById("goal-input");
      const txt = inp.value.trim(); if (!txt) { inp.focus(); return; }
      inp.value = "";
      await addGoal(_user.id, txt);
      inp.focus();
    }
  </script>
</body>
</html>
