<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyWithUs — Sign In</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gradient">
  <div class="deco-hearts"></div>
  <div id="toast-container" class="toast-container"></div>
  <div class="auth-page">
    <div class="auth-card card animate-in">
      <div class="auth-header">
        <span class="logo-mark">🎀</span>
        <h1>StudyWithUs</h1>
        <p>Your cozy study accountability partner 💖</p>
      </div>
      <div id="auth-msg" class="auth-msg hidden"></div>
      <div id="signin-form">
        <div class="input-group">
          <label for="signin-email">Email</label>
          <input type="email" id="signin-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="input-group">
          <label for="signin-password">Password</label>
          <input type="password" id="signin-password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button id="btn-signin" class="btn btn-primary w-full btn-lg" onclick="handleSignIn()">Sign In ✨</button>
        <div class="auth-divider">or</div>
        <button class="btn btn-google w-full" onclick="handleGoogleSignIn()">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
        <div class="auth-footer mt-2">Don't have an account? <a href="#" onclick="toggleForm(event)">Create one 🌸</a></div>
      </div>
      <div id="signup-form" class="hidden">
        <div class="input-group">
          <label for="signup-name">Your Name</label>
          <input type="text" id="signup-name" placeholder="What should we call you?" />
        </div>
        <div class="input-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="input-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" placeholder="Min 6 characters" autocomplete="new-password" />
        </div>
        <button id="btn-signup" class="btn btn-primary w-full btn-lg" onclick="handleSignUp()">Create Account 💖</button>
        <div class="auth-divider">or</div>
        <button class="btn btn-google w-full" onclick="handleGoogleSignIn()">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
        <div class="auth-footer mt-2">Already have an account? <a href="#" onclick="toggleForm(event)">Sign in ✨</a></div>
      </div>
    </div>
  </div>
  <script src="supabase.js"></script>
  <script src="app.js"></script>
  <script>
    (async () => {
      const session = await getSession();
      if (session && session.user && session.user.email_confirmed_at) window.location.href = "dashboard.html";
    })();
    onAuthChange(async (event, session) => {
      if ((event === "SIGNED_IN" || event === "TOKEN_REFRESHED") && session && session.user.email_confirmed_at) window.location.href = "dashboard.html";
    });
    function toggleForm(e) { if (e) e.preventDefault(); document.getElementById("signin-form").classList.toggle("hidden"); document.getElementById("signup-form").classList.toggle("hidden"); hideMsg(); }
    function showMsg(msg, type = "error") { const el = document.getElementById("auth-msg"); el.textContent = msg; el.className = "auth-msg auth-msg-" + type; el.classList.remove("hidden"); }
    function hideMsg() { document.getElementById("auth-msg").classList.add("hidden"); }
    async function handleSignIn() {
      hideMsg();
      const email = document.getElementById("signin-email").value.trim();
      const password = document.getElementById("signin-password").value;
      const btn = document.getElementById("btn-signin");
      if (!email || !password) { showMsg("Please fill in all fields."); return; }
      btn.disabled = true; btn.textContent = "Signing in…";
      try { await signIn(email, password); }
      catch (err) { showMsg(friendlyAuthError(err)); btn.disabled = false; btn.textContent = "Sign In ✨"; }
    }
    async function handleSignUp() {
      hideMsg();
      const name = document.getElementById("signup-name").value.trim();
      const email = document.getElementById("signup-email").value.trim();
      const password = document.getElementById("signup-password").value;
      const btn = document.getElementById("btn-signup");
      if (!name || !email || !password) { showMsg("Please fill in all fields."); return; }
      if (password.length < 6) { showMsg("Password must be at least 6 characters."); return; }
      btn.disabled = true; btn.textContent = "Creating…";
      try {
        const data = await signUp(email, password);
        if (data.user) await saveSettings(data.user.id, { displayName: name, emailUpdates: true, partnerEmail: "" });
        showMsg("🌸 Account created! Please check your inbox to verify your email before signing in.", "info");
        btn.disabled = false; btn.textContent = "Create Account 💖";
      } catch (err) { showMsg(friendlyAuthError(err)); btn.disabled = false; btn.textContent = "Create Account 💖"; }
    }
    async function handleGoogleSignIn() { hideMsg(); try { await signInWithGoogle(); } catch (err) { showMsg("Google sign-in failed. Please try again."); } }
    document.addEventListener("keydown", (e) => { if (e.key !== "Enter") return; const sv = !document.getElementById("signin-form").classList.contains("hidden"); if (sv) handleSignIn(); else handleSignUp(); });
    function friendlyAuthError(err) {
      const msg = (err.message || "").toLowerCase(), code = err.code || "";
      if (code === "auth/email-not-verified" || msg.includes("not verified")) return "📬 Please verify your email before signing in. Check your inbox!";
      if (msg.includes("invalid login") || msg.includes("invalid credentials")) return "Incorrect email or password. Give it another go! 💕";
      if (msg.includes("user already registered") || msg.includes("already in use")) return "That email is already registered. Sign in instead! ✨";
      if (msg.includes("invalid email")) return "That doesn't look like a valid email.";
      if (msg.includes("too many requests") || msg.includes("rate limit")) return "Too many attempts. Please try again in a moment.";
      return err.message || "Something went wrong. Please try again.";
    }
  </script>
</body>
</html>
