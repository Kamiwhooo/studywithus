<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyWithUs — Stats</title>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gradient">
  <div class="deco-hearts"></div>
  <div id="toast-container" class="toast-container"></div>
  <nav class="nav">
    <a href="dashboard.html" class="nav-brand"><span class="bow">🎀</span> StudyWithUs</a>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link"><span>🏠 </span>Home</a>
      <a href="stats.html" class="nav-link active"><span>📊 </span>Stats</a>
      <a href="settings.html" class="nav-link"><span>⚙️ </span>Settings</a>
      <button class="btn btn-ghost btn-sm" onclick="handleSignOut()">Sign out</button>
    </div>
  </nav>
  <main class="stats-page">
    <div class="page-header animate-in"><h1>Your Stats 📊</h1><p>Look how far you've come! Keep it up 💖</p></div>
    <div class="stats-grid animate-in delay-1">
      <div class="card stat-card"><span class="emoji">🕐</span><div class="big-number" id="stat-total-week">—</div><div class="label">Total this week</div></div>
      <div class="card stat-card"><span class="emoji">📅</span><div class="big-number" id="stat-daily-avg">—</div><div class="label">Daily average</div></div>
      <div class="card stat-card"><span class="emoji">🔥</span><div class="big-number" id="stat-streak">—</div><div class="label">Day streak</div></div>
      <div class="card stat-card"><span class="emoji">📚</span><div class="big-number" id="stat-total-sessions">—</div><div class="label">Sessions this week</div></div>
    </div>
    <div class="card animate-in delay-2">
      <div class="section-header"><span class="section-title">📈 This Week</span><span class="badge badge-pink" id="week-range"></span></div>
      <div class="bar-chart" id="bar-chart"></div>
    </div>
    <div class="card animate-in delay-3"><div class="section-header"><span class="section-title">🗓️ Daily Breakdown</span></div><div id="daily-breakdown"></div></div>
    <div class="card animate-in delay-3"><div class="section-header"><span class="section-title">🌸 All Sessions (7 days)</span></div><div class="sessions-list" id="all-sessions"></div></div>
  </main>
  <script src="supabase.js"></script>
  <script src="app.js"></script>
  <script>
    let currentUser=null;
    requireAuth(async(user)=>{currentUser=user;await loadStats();});
    async function loadStats(){try{const sessions=await getRecentSessions(currentUser.id,7);renderSummary(sessions);renderBarChart(sessions);renderDailyBreakdown(sessions);renderAllSessions(sessions);renderWeekRange();}catch(err){console.error("Error loading stats:",err);showToast("Error loading stats. Please try refreshing.","error");}}
    function renderSummary(sessions){const total=totalMinutes(sessions),days=buildWeeklyBreakdown(sessions),activeDays=days.filter(d=>d.minutes>0).length,avg=activeDays>0?Math.round(total/activeDays):0,streak=calcStreak(days);document.getElementById("stat-total-week").textContent=total>0?formatDuration(total):"0m";document.getElementById("stat-daily-avg").textContent=avg>0?formatDuration(avg):"0m";document.getElementById("stat-streak").textContent=streak+(streak===1?" day":" days");document.getElementById("stat-total-sessions").textContent=sessions.length;}
    function calcStreak(days){let s=0;for(let i=days.length-1;i>=0;i--){if(days[i].minutes>0)s++;else break;}return s;}
    function renderBarChart(sessions){const days=buildWeeklyBreakdown(sessions),maxMins=Math.max(...days.map(d=>d.minutes),1),chartEl=document.getElementById("bar-chart");chartEl.innerHTML=days.map(d=>{const hp=(d.minutes/maxMins)*100,hpx=Math.max(4,(hp/100)*130);return`<div class="bar-group"><div class="bar-value">${d.minutes>0?formatDuration(d.minutes):""}</div><div class="bar ${d.isToday?"today":""}" style="height:${hpx}px" title="${d.dayLabel}: ${formatDuration(d.minutes)}"></div><div class="bar-label">${d.dayLabel}</div></div>`;}).join("");}
    function renderDailyBreakdown(sessions){const days=buildWeeklyBreakdown(sessions),el=document.getElementById("daily-breakdown");el.innerHTML=[...days].reverse().map(d=>{const cnt=sessions.filter(s=>s.date===d.dateStr).length;return`<div class="session-item"><div><div class="session-date">${d.dayLabel}${d.isToday?" (Today)":""}</div><div class="session-time">${d.minutes>0?cnt+" session"+(cnt!==1?"s":""):"No sessions"}</div></div><div class="session-duration">${d.minutes>0?formatDuration(d.minutes):"—"}</div></div>`;}).join("");}
    function renderAllSessions(sessions){const el=document.getElementById("all-sessions");if(!sessions.length){el.innerHTML="<div class='sessions-empty'>No sessions this week yet. Start studying to see your progress! 🌷</div>";return;}el.innerHTML=sessions.map(s=>`<div class="session-item"><div><div class="session-date">${s.date||"—"}</div><div class="session-time">${s.startTimeLabel||""}${s.endTimeLabel?" → "+s.endTimeLabel:""}</div></div><div class="session-duration">${formatDuration(s.duration||0)}</div></div>`).join("");}
    function renderWeekRange(){const today=new Date(),start=new Date(today);start.setDate(today.getDate()-6);document.getElementById("week-range").textContent=start.toLocaleDateString([],{month:"short",day:"numeric"})+" – "+today.toLocaleDateString([],{month:"short",day:"numeric"});}
    async function handleSignOut(){await signOut();window.location.href="index.html";}
  </script>
</body>
</html>
